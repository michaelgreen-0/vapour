name: CI/CD

# Tests run on every pull request and on every push to master. Deployment to the
# VPS only happens on a push to master (i.e. after a PR is merged) and only if the
# test job has passed first. Combined with a branch-protection rule that requires
# the "test" check, this guarantees: tests pass before a PR can merge, and tests
# pass before anything is deployed.
on:
  push:
    branches: [master]
  pull_request:

# Never let two deploys run against the VPS at once.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Install the locked dependencies (includes the dev group: pytest). The
      # project itself is not packaged/installed -- the test modules import `src`
      # directly -- so mirror the Dockerfile's --no-install-project.
      - name: Sync dependencies
        run: uv sync --frozen --no-install-project

      - name: Run tests
        run: uv run --no-sync pytest -q

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      # Full history + tags so `git describe` can resolve the nearest release.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive app version
        run: echo "APP_VERSION=$(git describe --tags --always)" >> "$GITHUB_ENV"

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Push the working tree to the VPS. Excludes runtime/secret files so the
      # production .env and generated Caddyfile on the box are never overwritten
      # or deleted by --delete.
      - name: Sync code to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude '.venv' --exclude '.env' \
            --exclude '__pycache__' --exclude '.pytest_cache' \
            --exclude 'docker/Caddyfile' --exclude 'deploy.log' \
            -e "ssh -i $HOME/.ssh/deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes" \
            ./ "$VPS_USER@$VPS_HOST:/home/$VPS_USER/vapour/"

      # Rebuild the generated Caddyfile from the template (keeps Caddy config in
      # sync with the repo) and roll the stack. `user` is in the docker group, so
      # no sudo is needed. Build cache makes unchanged images near-instant.
      - name: Build and roll out
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DOMAIN: vapour.chat
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          ssh -i "$HOME/.ssh/deploy_key" \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "cd ~/vapour \
             && sed 's/__DOMAIN__/$DOMAIN/' docker/Caddyfile.prod.example > docker/Caddyfile \
             && APP_VERSION=$APP_VERSION docker compose -f docker/docker-compose.prod.yaml up -d --build \
             && docker image prune -f"
