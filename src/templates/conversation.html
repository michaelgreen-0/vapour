<!DOCTYPE html>
<html>
<head>
    <title>Vapour</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- See chat.html: visible by default, removed by conversation.js when JS
         runs, so it persists when scripts are blocked. -->
    <div class="js-warning" id="jsWarning">
        ⚠ Vapour needs JavaScript to work. If you're using Tor Browser, open the
        shield menu and set your <strong>Security Level</strong> to
        <strong>Standard</strong> — the onion service is served over http, where
        the higher levels disable JavaScript.
    </div>

    <h1>Chat with {{ recipient_id }}</h1>
    <p><a href="/chat">&larr; Back to contacts</a></p>
    
    <div id="status"></div>
    <div id="messages"></div>
    
    <div id="input-area">
        <input type="text" id="messageText" autocomplete="off" placeholder="Type a message..." disabled/>
        <button id="sendButton" disabled>Send</button>
    </div>

    <script src="/static/js/conversation.js"
            data-user-id="{{ user_id }}"
            data-recipient-id="{{ recipient_id }}"></script>
</body>
</html>
